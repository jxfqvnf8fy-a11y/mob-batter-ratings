<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Today's MLB Batter Ratings</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #191f25;
      --panel-2: #222a31;
      --ink: #eef3f6;
      --muted: #a9b5bd;
      --line: #313b44;
      --accent: #3dbb9d;
      --accent-2: #ff9c6e;
      --good: #158653;
      --mid: #a97808;
      --bad: #b84949;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 22px;
      letter-spacing: 0;
    }
    .controls {
      display: grid;
      grid-template-columns: 1.4fr repeat(3, minmax(130px, 1fr));
      gap: 10px;
      align-items: end;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 9px;
      background: var(--panel-2);
      color: var(--ink);
      font: inherit;
    }
    main { padding: 16px 22px 26px; }
    .section-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .matchups {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .matchup-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      font: inherit;
    }
    .matchup-card:hover,
    .matchup-card.active {
      border-color: var(--accent);
      background: #1d292e;
    }
    .matchup-card.ou-high {
      border-color: #d39b2a;
      background: #2a2417;
    }
    .matchup-card strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
    }
    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 210px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #202830;
      z-index: 2;
      font-size: 12px;
      color: #d6dde2;
      cursor: pointer;
      user-select: none;
    }
    td.num, th.num { text-align: right; }
    td.expand-cell, th.expand-cell {
      width: 46px;
      text-align: center;
    }
    .expand-button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .details-row td {
      padding: 0;
      background: #141a1f;
      white-space: normal;
    }
    .details {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
      padding: 12px 14px 14px 58px;
    }
    .detail-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: var(--panel);
    }
    .detail-item span {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .detail-item strong {
      font-size: 14px;
      font-weight: 650;
    }
    .player {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .team-logo {
      width: 24px;
      height: 24px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    tr:hover td { background: #202830; }
    .rating {
      display: inline-block;
      min-width: 44px;
      border-radius: 999px;
      padding: 3px 8px;
      color: #fff;
      text-align: center;
      font-weight: 700;
    }
    .high { background: var(--good); }
    .medium { background: var(--mid); }
    .low { background: var(--bad); }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--panel-2);
    }
    .yes { color: var(--accent-2); font-weight: 700; }
    .empty { padding: 34px; text-align: center; color: var(--muted); }
    @media (max-width: 900px) {
      header { position: static; }
      .controls { grid-template-columns: 1fr 1fr; }
      .matchups { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .controls label:first-child { grid-column: 1 / -1; }
      .table-wrap { max-height: none; }
    }
    @media (max-width: 640px) {
      body {
        font-size: 13px;
      }
      header {
        padding: 14px 12px 12px;
      }
      h1 {
        margin-bottom: 12px;
        font-size: 18px;
      }
      .controls {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .controls label:first-child {
        grid-column: auto;
      }
      input, select {
        min-height: 42px;
        font-size: 16px;
      }
      main {
        padding: 12px;
      }
      .matchups {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }
      .matchup-card {
        padding: 6px 4px;
      }
      .matchup-card strong {
        font-size: 11px;
        line-height: 1.15;
      }
      .table-wrap {
        max-height: none;
        overflow-x: auto;
      }
      table {
        min-width: 0;
      }
      th:nth-child(4), td:nth-child(4) {
        display: none;
      }
      th, td {
        padding: 8px 7px;
      }
      td {
        white-space: normal;
      }
      td.num {
        text-align: right;
      }
      .details {
        grid-template-columns: 1fr;
        padding: 10px;
      }
      .expand-cell {
        width: 38px;
      }
      .expand-button {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>

er_team_logo_url": "https://www.mlbstatic.com/team-logos/142.svg", "matchup": "SEA @ MIN", "over_under": "", "run_line": "", "probable_pitcher_name": "George Kirby", "venue_name": "Target Field", "home_away": "Home", "on_base_percentage": 0.28, "pitcher_avg_strikeouts": 4.625, "pitcher_avg_strikeouts_last_5": 4.6, "has_historically_homered_off_pitcher": false, "hr_vs_probable_pitcher": 0, "total_hr_year": 3}, {"batter_rating": 23.2, "batter_name": "mike yastrzemski", "batter_team": "ATL", "batter_team_logo_url": "https://www.mlbstatic.com/team-logos/144.svg", "matchup": "DET @ ATL", "over_under": "8.5 (O +100 / U -120)", "run_line": "DET -1.5 (+120); ATL +1.5 (-145)", "probable_pitcher_name": "Tarik Skubal", "venue_name": "Truist Park", "home_away": "Home", "on_base_percentage": 0.246, "pitcher_avg_strikeouts": 6.143, "pitcher_avg_strikeouts_last_5": 6.4, "has_historically_homered_off_pitcher": false, "hr_vs_probable_pitcher": 0, "total_hr_year": 2}, {"batter_rating": 22.6, "batter_name": "austin hedges", "batter_team": "CLE", "batter_team_logo_url": "https://www.mlbstatic.com/team-logos/114.svg", "matchup": "TB @ CLE", "over_under": "", "run_line": "", "probable_pitcher_name": "Drew Rasmussen", "venue_name": "Progressive Field", "home_away": "Home", "on_base_percentage": 0.286, "pitcher_avg_strikeouts": 4.833, "pitcher_avg_strikeouts_last_5": 5.2, "has_historically_homered_off_pitcher": false, "hr_vs_probable_pitcher": 0, "total_hr_year": 0}, {"batter_rating": 22.1, "batter_name": "ronny mauricio", "batter_team": "NYM", "batter_team_logo_url": "https://www.mlbstatic.com/team-logos/121.svg", "matchup": "WSH @ NYM", "over_under": "7.5 (O +100 / U -120)", "run_line": "WSH +1.5 (-170); NYM -1.5 (+140)", "probable_pitcher_name": "Cade Cavalli", "venue_name": "Citi Field", "home_away": "Home", "on_base_percentage": 0.235, "pitcher_avg_strikeouts": 4.143, "pitcher_avg_strikeouts_last_5": 4.6, "has_historically_homered_off_pitcher": false, "hr_vs_probable_pitcher": 0, "total_hr_year": 0}];
    const matchups = [...new Set(rows.map(row => row.matchup).filter(Boolean))].sort();
    const summaryColumns = [
      ["expand", "", "expand-cell"],
      ["batter_rating", "Rating", "num"],
      ["batter_name", "Player", ""],
      ["matchup", "Matchup", ""],
    ];
    const detailColumns = [
      ["batter_team", "Team", ""],
      ["probable_pitcher_name", "Probable Pitcher", ""],
      ["venue_name", "Venue", ""],
      ["home_away", "Home/Away", ""],
      ["over_under", "O/U", ""],
      ["run_line", "Run Line", ""],
      ["on_base_percentage", "OBP", "num"],
      ["pitcher_avg_strikeouts", "P K Avg Season", "num"],
      ["pitcher_avg_strikeouts_last_5", "P K Avg L5", "num"],
      ["has_historically_homered_off_pitcher", "HR Off P?", ""],
      ["hr_vs_probable_pitcher", "HR vs Probable P", "num"],
      ["total_hr_year", "Season HR", "num"]
    ];
    const columns = [...summaryColumns, ...detailColumns];
    let sortKey = "batter_rating";
    let sortDir = -1;
    const expandedRows = new Set();

    const state = {
      search: document.getElementById("search"),
      matchup: document.getElementById("matchup"),
      venue: document.getElementById("venue"),
      homeAway: document.getElementById("homeAway"),
      body: document.getElementById("bodyRows")
    };

    function numberValue(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : -Infinity;
    }

    function ratingClass(value) {
      const score = numberValue(value);
      if (score >= 65) return "high";
      if (score >= 55) return "medium";
      return "low";
    }

    function formatCell(key, value) {
      if (value === "" || value === null || value === undefined) return "";
      if (key === "batter_rating") return `<span class="rating ${ratingClass(value)}">${Number(value).toFixed(1)}</span>`;
      if (key === "on_base_percentage") return Number(value).toFixed(3).replace(/^0/, "");
      if (key.includes("strikeouts")) return Number(value).toFixed(2);
      if (key === "has_historically_homered_off_pitcher") return value === true || value === "True" ? '<span class="yes">Yes</span>' : "No";
      if (key === "hr_vs_probable_pitcher" || key === "total_hr_year") return String(Math.trunc(Number(value) || 0));
      if (key === "home_away") return `<span class="pill">${value}</span>`;
      return String(value);
    }

    function formatSummaryCell(key, row) {
      if (key === "batter_name") {
        const logo = row.batter_team_logo_url ? `<img class="team-logo" src="${row.batter_team_logo_url}" alt="">` : "";
        return `<span class="player">${logo}<span>${formatCell(key, row[key])}</span></span>`;
      }
      return formatCell(key, row[key]);
    }

    function filteredRows() {
      const query = state.search.value.trim().toLowerCase();
      return rows.filter(row => {
        const blob = `${row.batter_name} ${row.batter_team} ${row.matchup} ${row.probable_pitcher_name} ${row.venue_name}`.toLowerCase();
        return (!query || blob.includes(query))
          && (!state.matchup.value || row.matchup === state.matchup.value)
          && (!state.venue.value || row.venue_name === state.venue.value)
          && (!state.homeAway.value || row.home_away === state.homeAway.value);
      }).sort((a, b) => {
        const av = typeof a[sortKey] === "number" ? a[sortKey] : numberValue(a[sortKey]);
        const bv = typeof b[sortKey] === "number" ? b[sortKey] : numberValue(b[sortKey]);
        if (Number.isFinite(av) || Number.isFinite(bv)) return (av - bv) * sortDir;
        return String(a[sortKey] || "").localeCompare(String(b[sortKey] || "")) * sortDir;
      });
    }

    function renderHeader() {
      const header = document.getElementById("headerRow");
      header.innerHTML = summaryColumns.map(([key, label, cls]) =>
        `<th class="${cls}" data-key="${key}">${label}${key === sortKey ? (sortDir === -1 ? " ↓" : " ↑") : ""}</th>`
      ).join("");
      header.querySelectorAll("th").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (key === "expand") return;
          if (sortKey === key) sortDir *= -1;
          else {
            sortKey = key;
            sortDir = key === "batter_name" ? 1 : -1;
          }
          render();
        });
      });
    }

    function renderMatchupCards() {
      const container = document.getElementById("matchupCards");
      container.innerHTML = matchups.map(matchup => {
        const gameRows = rows.filter(row => row.matchup === matchup);
        const total = Number(String(gameRows.find(row => row.over_under)?.over_under || "").match(/\d+(?:\.\d+)?/)?.[0]);
        const active = state.matchup.value === matchup ? " active" : "";
        const highTotal = Number.isFinite(total) && total > 8 ? " ou-high" : "";
        return `<button class="matchup-card${active}${highTotal}" type="button" data-matchup="${matchup}"><strong>${matchup}</strong></button>`;
      }).join("");
      container.querySelectorAll(".matchup-card").forEach(card => {
        card.addEventListener("click", () => {
          state.matchup.value = state.matchup.value === card.dataset.matchup ? "" : card.dataset.matchup;
          render();
        });
      });
    }

    function renderBody(data) {
      if (!data.length) {
        state.body.innerHTML = `<tr><td colspan="${summaryColumns.length}" class="empty">No hitters match the current filters.</td></tr>`;
        return;
      }
      state.body.innerHTML = data.map(row => {
        const rowId = `${row.batter_name}|${row.batter_team}|${row.matchup}|${row.probable_pitcher_name}`;
        const isOpen = expandedRows.has(rowId);
        const summary = summaryColumns.map(([key, label, cls]) => {
          if (key === "expand") {
            return `<td class="${cls}"><button class="expand-button" type="button" data-row-id="${rowId}" aria-expanded="${isOpen}">${isOpen ? "−" : "+"}</button></td>`;
          }
          return `<td class="${cls}" data-label="${label}">${formatSummaryCell(key, row)}</td>`;
        }).join("");
        const details = detailColumns.map(([key, label]) =>
          `<div class="detail-item"><span>${label}</span><strong>${formatCell(key, row[key]) || "—"}</strong></div>`
        ).join("");
        return `<tr>${summary}</tr>${isOpen ? `<tr class="details-row"><td colspan="${summaryColumns.length}"><div class="details">${details}</div></td></tr>` : ""}`;
      }).join("");
      state.body.querySelectorAll(".expand-button").forEach(button => {
        button.addEventListener("click", () => {
          const rowId = button.dataset.rowId;
          if (expandedRows.has(rowId)) expandedRows.delete(rowId);
          else expandedRows.add(rowId);
          render();
        });
      });
    }

    function render() {
      const data = filteredRows();
      renderHeader();
      renderMatchupCards();
      renderBody(data);
    }

    [state.search, state.matchup, state.venue, state.homeAway].forEach(control => {
      control.addEventListener("input", render);
      control.addEventListener("change", render);
    });

    render();
  </script>
